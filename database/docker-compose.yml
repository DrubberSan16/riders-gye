services:
  postgres:
    container_name: ridersapp-postgres
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ridersapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
      PGTZ: America/Guayaquil
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ridersapp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
